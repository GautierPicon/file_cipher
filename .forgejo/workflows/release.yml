name: Release on version bump

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml

jobs:
  check-and-release:
    runs-on: codeberg-tiny
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git tag | grep -q "^${{ steps.version.outputs.tag }}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "New version detected: ${{ steps.version.outputs.tag }}"
          fi

      - name: Install uv
        if: steps.tag_check.outputs.exists == 'false'
        uses: https://github.com/astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build wheel
        if: steps.tag_check.outputs.exists == 'false'
        run: uv build

      - name: Generate release notes
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          LAST_TAG=$(git tag --sort=-version:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" "$LAST_TAG"..HEAD)
          fi

          cat > /tmp/release_notes.md << NOTES
          ## What's changed

          $COMMITS

          ## Assets

          - \`file_cipher-${{ steps.version.outputs.version }}-py3-none-any.whl\` — installable wheel
          - \`file_cipher-${{ steps.version.outputs.version }}.tar.gz\` — source archive
          NOTES

          echo "--- release notes ---"
          cat /tmp/release_notes.md

      - name: Create tag and release
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          API="${{ github.server_url }}/api/v1"
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          TAG="${{ steps.version.outputs.tag }}"

          echo "Creating tag $TAG..."

          # Crée le tag
          curl -s -o /tmp/tag_response.json -w "Tag HTTP: %{http_code}\n" \
            -X POST "$API/repos/$REPO/tags" \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"$TAG\", \"message\": \"Release $TAG\"}"
          cat /tmp/tag_response.json

          # Crée la release
          RELEASE_BODY=$(python3 -c "import json; print(json.dumps(open('/tmp/release_notes.md').read()))")

          curl -s -o /tmp/release_response.json -w "Release HTTP: %{http_code}\n" \
            -X POST "$API/repos/$REPO/releases" \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"$TAG\", \"name\": \"$TAG\", \"body\": $RELEASE_BODY, \"draft\": false, \"prerelease\": false}"
          cat /tmp/release_response.json

          RELEASE_ID=$(python3 -c "
          import json, sys
          data = json.load(open('/tmp/release_response.json'))
          if 'id' not in data:
              print('ERROR:', data, file=sys.stderr)
              sys.exit(1)
          print(data['id'])
          ")

          echo "Release id: $RELEASE_ID"

          # Upload les assets
          curl -s -X POST "$API/repos/$REPO/releases/$RELEASE_ID/assets" \
            -H "Authorization: token $TOKEN" \
            -F "attachment=@$(ls dist/*.whl)"

          curl -s -X POST "$API/repos/$REPO/releases/$RELEASE_ID/assets" \
            -H "Authorization: token $TOKEN" \
            -F "attachment=@$(ls dist/*.tar.gz)"

          echo "✓ Release $TAG published."